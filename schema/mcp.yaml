    - ImageContent_type
    - _meta
    - annotations
    slot_usage:
      data:
        name: data
        required: true
      mimeType:
        name: mimeType
        required: true
      type:
        name: type
        required: true
        equals_string: image
    class_uri: mcp:ImageContent
  AudioContent:
    name: AudioContent
