classes:
  HasMeta:
    name: HasMeta
    definition_uri: https://w3id.org/lmodel/mcp/HasMeta
    description: Mixin for types that carry a _meta field.
    from_schema: https://w3id.org/lmodel/mcp
    aliases:
    - NotificationParams
    - RequestParams
    mixin: true
    slots:
    - _meta
    class_uri: mcp:HasMeta
  HasAnnotations:
    name: HasAnnotations
    definition_uri: https://w3id.org/lmodel/mcp/HasAnnotations
    description: Mixin for types that carry annotations.
    from_schema: https://w3id.org/lmodel/mcp
    mixin: true
    slots:
    - annotations
    class_uri: mcp:HasAnnotations
  HasIcons:
    name: HasIcons
    definition_uri: https://w3id.org/lmodel/mcp/HasIcons
    description: Mixin for types that carry icons.
    from_schema: https://w3id.org/lmodel/mcp
    aliases:
    - Icons
    mixin: true
    slots:
    - icons
    class_uri: mcp:HasIcons
  HasName:
    name: HasName
    definition_uri: https://w3id.org/lmodel/mcp/HasName
    description: Mixin for types that carry name and title.
    from_schema: https://w3id.org/lmodel/mcp
    aliases:
    - BaseMetadata
    mixin: true
    slots:
    - name
    - title
    class_uri: mcp:HasName
  Annotations:
    name: Annotations
    definition_uri: https://w3id.org/lmodel/mcp/Annotations
    description: Optional annotations for the client. The client can use annotations
      to inform how objects are used or displayed.
    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - audience
    - lastModified
    - priority
    class_uri: mcp:Annotations
  Error:
    name: Error
    definition_uri: https://w3id.org/lmodel/mcp/Error
    description: A JSON-RPC error object.
    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - Error_code
    - Error_data
    - Error_message
    slot_usage:
      code:
        name: code
        required: true
      data:
        name: data
        range: ErrorData
        inlined: true
      message:
        name: message
        required: true
    class_uri: mcp:Error
  InternalError:
    name: InternalError
    definition_uri: https://w3id.org/lmodel/mcp/InternalError
    description: A JSON-RPC error indicating that an internal error occurred on the
      receiver (-32603).
    from_schema: https://w3id.org/lmodel/mcp
    is_a: Error
    slots:
    - Error_code
    - Error_data
    - Error_message
    class_uri: mcp:InternalError
  InvalidParamsError:
    name: InvalidParamsError
    definition_uri: https://w3id.org/lmodel/mcp/InvalidParamsError
    description: A JSON-RPC error indicating that the method parameters are invalid
      or malformed (-32602).
    from_schema: https://w3id.org/lmodel/mcp
    is_a: Error
    slots:
    - Error_code
    - Error_data
    - Error_message
    class_uri: mcp:InvalidParamsError
  InvalidRequestError:
    name: InvalidRequestError
    definition_uri: https://w3id.org/lmodel/mcp/InvalidRequestError
    description: A JSON-RPC error indicating that the request is not a valid request
      object (-32600).
    from_schema: https://w3id.org/lmodel/mcp
    is_a: Error
    slots:
    - Error_code
    - Error_data
    - Error_message
    class_uri: mcp:InvalidRequestError
  MethodNotFoundError:
    name: MethodNotFoundError
    definition_uri: https://w3id.org/lmodel/mcp/MethodNotFoundError
    description: A JSON-RPC error indicating that the requested method does not exist
      or is not available (-32601).
    from_schema: https://w3id.org/lmodel/mcp
    is_a: Error
    slots:
    - Error_code
    - Error_data
    - Error_message
    class_uri: mcp:MethodNotFoundError
  ParseError:
    name: ParseError
    definition_uri: https://w3id.org/lmodel/mcp/ParseError
    description: A JSON-RPC error indicating that invalid JSON was received by the
      server (-32700).
    from_schema: https://w3id.org/lmodel/mcp
    is_a: Error
    slots:
    - Error_code
    - Error_data
    - Error_message
    class_uri: mcp:ParseError
  URLElicitationRequiredError:
    name: URLElicitationRequiredError
    definition_uri: https://w3id.org/lmodel/mcp/URLElicitationRequiredError
    description: A response indicating that additional information is required via
      URL elicitation.
    from_schema: https://w3id.org/lmodel/mcp
    is_a: JSONRPCErrorResponse
    slots:
    - JSONRPCErrorResponse_id
    - JSONRPCErrorResponse_jsonrpc
    - JSONRPCErrorResponse_error
    class_uri: mcp:URLElicitationRequiredError
  Icon:
    name: Icon
    definition_uri: https://w3id.org/lmodel/mcp/Icon
    description: An optionally-sized icon that can be displayed in a user interface.
    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - Icon_src
    - mimeType
    - sizes
    - theme
    slot_usage:
      src:
        name: src
        required: true
    class_uri: mcp:Icon
