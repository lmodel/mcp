    from_schema: https://w3id.org/lmodel/mcp
    mixins:
    - HasMeta
    - HasAnnotations
    slots:
    - TextContent_text
    - TextContent_type
    - _meta
    - annotations
    slot_usage:
      text:
        name: text
        required: true
      type:
        name: type
        required: true
        equals_string: text
    class_uri: mcp:TextContent
  ImageContent:
    name: ImageContent
    definition_uri: https://w3id.org/lmodel/mcp/ImageContent
