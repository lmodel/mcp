    from_schema: https://w3id.org/lmodel/mcp
    mixins:
    - HasName
    - HasIcons
    slots:
    - Implementation_version
    - description
    - websiteUrl
    - Implementation_name
    - title
    - icons
    slot_usage:
      name:
        name: name
        required: true
      version:
        name: version
        required: true
    class_uri: mcp:Implementation
