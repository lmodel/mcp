    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - experimental
    - ServerCapabilities_extensions
    - ServerCapabilities_prompts
    - ServerCapabilities_resources
    - ServerCapabilities_tools
    - ServerCapabilities_tasks
    slot_usage:
      extensions:
        name: extensions
        range: ExtensionsCapability
        inlined: true
      prompts:
        name: prompts
        range: PromptsCapability
        multivalued: false
        inlined: true
      resources:
        name: resources
        range: ResourcesCapability
        multivalued: false
        inlined: true
      tools:
        name: tools
        range: ToolsCapability
        multivalued: false
        inlined: true
      tasks:
        name: tasks
        range: TasksCapability
        multivalued: false
        inlined: true
    class_uri: mcp:ServerCapabilities
    extra_slots:
      allowed: true
