    - maxLength
    - title
    slot_usage:
      type:
        name: type
        required: true
        equals_string: string
    class_uri: mcp:StringSchema
  NumberSchema:
    name: NumberSchema
    definition_uri: https://w3id.org/lmodel/mcp/NumberSchema
