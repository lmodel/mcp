    - TitledMultiSelectEnumSchema_default
    - default_value
    - description
    - title
    - minItems
    - maxItems
    slot_usage:
      items:
        name: items
        range: SchemaItems
      default:
        name: default
        range: string
        multivalued: true
      type:
        name: type
        required: true
        equals_string: array
