name: mcp
description: Model Context Protocol LinkML Schema
title: mcp
source: https://github.com/modelcontextprotocol/modelcontextprotocol/tree/main/schema
see_also:
- https://lmodel.github.io/mcp
- https://spec.modelcontextprotocol.io
id: https://w3id.org/lmodel/mcp
version: draft
imports:
- linkml:types
license: Apache-2.0
prefixes:
  mcp:
    prefix_prefix: mcp
    prefix_reference: https://w3id.org/lmodel/mcp/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dct:
    prefix_prefix: dct
    prefix_reference: http://purl.org/dc/terms/
  jsonrpc:
    prefix_prefix: jsonrpc
    prefix_reference: https://www.jsonrpc.org/
default_prefix: mcp
default_range: string
types:
  Cursor:
    name: Cursor
    definition_uri: https://w3id.org/lmodel/mcp/Cursor
    description: An opaque token used to represent a cursor for pagination.
    from_schema: https://w3id.org/lmodel/mcp
    base: str
    uri: xsd:string
  ProgressToken:
    name: ProgressToken
    definition_uri: https://w3id.org/lmodel/mcp/ProgressToken
    description: A progress token, used to associate progress notifications with the
      original request.
    from_schema: https://w3id.org/lmodel/mcp
    base: str
    uri: xsd:string
  RequestId:
    name: RequestId
    definition_uri: https://w3id.org/lmodel/mcp/RequestId
    description: A uniquely identifying ID for a request in JSON-RPC.
    from_schema: https://w3id.org/lmodel/mcp
    base: str
    uri: xsd:string
  JsonValue:
    name: JsonValue
    definition_uri: https://w3id.org/lmodel/mcp/JsonValue
    description: Any JSON-serializable value.
    from_schema: https://w3id.org/lmodel/mcp
    aliases:
    - JSONValue
    - JSONArray
    - JSONObject
    base: object
    uri: xsd:anyType
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  Role:
    name: Role
    definition_uri: https://w3id.org/lmodel/mcp/Role
    description: The sender or recipient of messages and data in a conversation.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      assistant:
        text: assistant
        description: The assistant role.
      user:
        text: user
        description: The user role.
  LoggingLevel:
    name: LoggingLevel
    definition_uri: https://w3id.org/lmodel/mcp/LoggingLevel
    description: The severity of a log message. Maps to syslog message severities
      (RFC-5424).
    from_schema: https://w3id.org/lmodel/mcp
    see_also:
    - https://datatracker.ietf.org/doc/html/rfc5424#section-6.2.1
    permissible_values:
      alert:
        text: alert
        description: Alert severity.
      critical:
        text: critical
        description: Critical severity.
      debug:
        text: debug
        description: Debug severity.
      emergency:
        text: emergency
        description: Emergency severity.
      error:
        text: error
        description: Error severity.
      info:
        text: info
        description: Informational severity.
      notice:
        text: notice
        description: Notice severity.
      warning:
        text: warning
        description: Warning severity.
  TaskStatusEnum:
    name: TaskStatusEnum
    definition_uri: https://w3id.org/lmodel/mcp/TaskStatusEnum
    description: The status of a task.
    from_schema: https://w3id.org/lmodel/mcp
    aliases:
    - TaskStatus
    permissible_values:
      cancelled:
        text: cancelled
        description: Task was cancelled.
      completed:
        text: completed
        description: Task completed successfully.
      failed:
        text: failed
        description: Task failed.
      input_required:
        text: input_required
        description: Task requires additional input.
      working:
        text: working
        description: Task is currently in progress.
  IncludeContextEnum:
    name: IncludeContextEnum
    definition_uri: https://w3id.org/lmodel/mcp/IncludeContextEnum
    description: Context inclusion mode for sampling requests.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      allServers:
        text: allServers
        description: Include context from all servers.
      none:
        text: none
        description: Include no context.
      thisServer:
        text: thisServer
        description: Include context from calling server only.
  ElicitActionEnum:
    name: ElicitActionEnum
    definition_uri: https://w3id.org/lmodel/mcp/ElicitActionEnum
    description: User action in response to an elicitation.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      accept:
        text: accept
        description: User submitted the form/confirmed the action.
      cancel:
        text: cancel
        description: User dismissed without making an explicit choice.
      decline:
        text: decline
        description: User explicitly declined the action.
  ToolChoiceModeEnum:
    name: ToolChoiceModeEnum
    definition_uri: https://w3id.org/lmodel/mcp/ToolChoiceModeEnum
    description: Controls tool selection behavior for sampling requests.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      auto:
        text: auto
        description: Model decides whether to use tools (default).
      none:
        text: none
        description: Model MUST NOT use any tools.
      required:
        text: required
        description: Model MUST use at least one tool before completing.
  TaskSupportEnum:
    name: TaskSupportEnum
    definition_uri: https://w3id.org/lmodel/mcp/TaskSupportEnum
    description: Indicates whether a tool supports task-augmented execution.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      forbidden:
        text: forbidden
        description: Tool does not support task-augmented execution (default).
      optional:
        text: optional
        description: Tool may support task-augmented execution.
      required:
        text: required
        description: Tool requires task-augmented execution.
  IconThemeEnum:
    name: IconThemeEnum
    definition_uri: https://w3id.org/lmodel/mcp/IconThemeEnum
    description: Theme specifier for an icon.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      dark:
        text: dark
        description: Icon designed for a dark background.
      light:
        text: light
        description: Icon designed for a light background.
  NumberTypeEnum:
    name: NumberTypeEnum
    definition_uri: https://w3id.org/lmodel/mcp/NumberTypeEnum
    description: Number type discriminator.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      integer:
        text: integer
        description: Integer type.
      number:
        text: number
        description: Number type.
  StringFormatEnum:
    name: StringFormatEnum
    definition_uri: https://w3id.org/lmodel/mcp/StringFormatEnum
    description: String format constraints.
    from_schema: https://w3id.org/lmodel/mcp
    permissible_values:
      date:
        text: date
        description: Date format.
      date-time:
        text: date-time
        description: Date-time format.
      email:
        text: email
        description: Email format.
      uri:
        text: uri
        description: URI format.
slots:
  jsonrpc:
    name: jsonrpc
    definition_uri: https://w3id.org/lmodel/mcp/jsonrpc
    description: JSON-RPC version string.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:jsonrpc
    owner: JSONRPCErrorResponse
    domain_of:
    - JSONRPCRequest
    - JSONRPCNotification
    - JSONRPCResultResponse
    - JSONRPCErrorResponse
    range: string
    required: true
  id:
    name: id
    definition_uri: https://w3id.org/lmodel/mcp/id
    description: Uniquely identifying ID for a JSON-RPC request.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:id
    owner: JSONRPCErrorResponse
    domain_of:
    - ToolUseContent
    - JSONRPCRequest
    - JSONRPCResultResponse
    - JSONRPCErrorResponse
    range: RequestId
  method:
    name: method
    definition_uri: https://w3id.org/lmodel/mcp/method
    description: The JSON-RPC method name.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:method
    owner: JSONRPCNotification
    domain_of:
    - JSONRPCRequest
    - JSONRPCNotification
    range: string
  name:
    name: name
    definition_uri: https://w3id.org/lmodel/mcp/name
    description: Intended for programmatic or logical use, but used as a display name
      in past specs or fallback (if title is not present).
    from_schema: https://w3id.org/lmodel/mcp
    mappings:
    - schema:name
    slot_uri: schema:name
    owner: GetPromptRequestParams
    domain_of:
    - HasName
    - ToolUseContent
    - Root
    - CompletionArgument
    - SchemaProperties
    - ElicitationContent
    - ModelHint
    - CallToolRequestParams
    - GetPromptRequestParams
    range: string
  title:
    name: title
    definition_uri: https://w3id.org/lmodel/mcp/title
    description: "Intended for UI and end-user contexts \u2014 optimized to be human-readable\
      \ and easily understood."
    from_schema: https://w3id.org/lmodel/mcp
    mappings:
    - dct:title
    slot_uri: dct:title
    owner: LegacyTitledEnumSchema
    domain_of:
    - HasName
    - ToolAnnotations
    - EnumOption
    - JsonSchema
    - StringSchema
    - NumberSchema
    - BooleanSchema
    - UntitledSingleSelectEnumSchema
    - TitledSingleSelectEnumSchema
    - UntitledMultiSelectEnumSchema
    - TitledMultiSelectEnumSchema
    - LegacyTitledEnumSchema
    range: string
  description:
    name: description
    definition_uri: https://w3id.org/lmodel/mcp/description
    description: A human-readable description.
    from_schema: https://w3id.org/lmodel/mcp
    mappings:
    - dct:description
    slot_uri: dct:description
    owner: GetPromptResult
    domain_of:
    - Implementation
    - ResourceLink
    - Resource
    - ResourceTemplate
    - PromptArgument
    - Prompt
    - JsonSchema
    - Tool
    - StringSchema
    - NumberSchema
    - BooleanSchema
    - UntitledSingleSelectEnumSchema
    - TitledSingleSelectEnumSchema
    - UntitledMultiSelectEnumSchema
    - TitledMultiSelectEnumSchema
    - LegacyTitledEnumSchema
    - GetPromptResult
    range: string
  uri:
    name: uri
    definition_uri: https://w3id.org/lmodel/mcp/uri
    description: A resource URI.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:uri
    owner: UnsubscribeRequestParams
    domain_of:
    - ResourceLink
    - ResourceContents
    - TextResourceContents
    - BlobResourceContents
    - Resource
    - Root
    - ResourceTemplateReference
    - ResourceUpdatedNotificationParams
    - ReadResourceRequestParams
    - SubscribeRequestParams
    - UnsubscribeRequestParams
    range: uri
  mimeType:
    name: mimeType
    definition_uri: https://w3id.org/lmodel/mcp/mimeType
    description: The MIME type of a resource, if known.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:mimeType
    owner: ResourceTemplate
    domain_of:
    - Icon
    - ImageContent
    - AudioContent
    - ResourceLink
    - ResourceContents
    - TextResourceContents
    - BlobResourceContents
    - Resource
    - ResourceTemplate
    range: string
  type:
    name: type
    definition_uri: https://w3id.org/lmodel/mcp/type
    description: Type discriminator field.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:type
    owner: LegacyTitledEnumSchema
    domain_of:
    - TextContent
    - ImageContent
    - AudioContent
    - ContentBlock
    - EmbeddedResource
    - ResourceLink
    - ToolUseContent
    - ToolResultContent
    - PromptReference
    - ResourceTemplateReference
    - SchemaItems
    - JsonSchema
    - StringSchema
    - NumberSchema
    - BooleanSchema
    - UntitledSingleSelectEnumSchema
    - TitledSingleSelectEnumSchema
    - UntitledMultiSelectEnumSchema
    - TitledMultiSelectEnumSchema
    - LegacyTitledEnumSchema
    range: string
  text:
    name: text
    definition_uri: https://w3id.org/lmodel/mcp/text
    description: Text content.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:text
    owner: TextResourceContents
    domain_of:
    - TextContent
    - ContentBlock
    - ResourceContents
    - TextResourceContents
    range: string
  data:
    name: data
    definition_uri: https://w3id.org/lmodel/mcp/data
    description: Base64-encoded binary data.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:data
    owner: LoggingMessageNotificationParams
    domain_of:
    - Error
    - ImageContent
    - AudioContent
    - LoggingMessageNotificationParams
    range: string
  default:
    name: default
    definition_uri: https://w3id.org/lmodel/mcp/default
    description: Default value for a schema field.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:default
    owner: LegacyTitledEnumSchema
    domain_of:
    - JsonSchema
    - StringSchema
    - NumberSchema
    - BooleanSchema
    - UntitledSingleSelectEnumSchema
    - TitledSingleSelectEnumSchema
    - UntitledMultiSelectEnumSchema
    - TitledMultiSelectEnumSchema
    - LegacyTitledEnumSchema
    range: JsonValue
  enum:
    name: enum
    definition_uri: https://w3id.org/lmodel/mcp/enum
    description: Array of enum values.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:enum
    owner: LegacyTitledEnumSchema
    domain_of:
    - SchemaItems
    - JsonSchema
    - UntitledSingleSelectEnumSchema
    - LegacyTitledEnumSchema
    range: string
    multivalued: true
  oneOf:
    name: oneOf
    definition_uri: https://w3id.org/lmodel/mcp/oneOf
    description: JSON Schema oneOf entries.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:oneOf
    owner: TitledSingleSelectEnumSchema
    domain_of:
    - JsonSchema
    - TitledSingleSelectEnumSchema
    range: EnumOption
    multivalued: true
    inlined: true
    inlined_as_list: true
  items:
    name: items
    definition_uri: https://w3id.org/lmodel/mcp/items
    description: JSON Schema items definition.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:items
    owner: TitledMultiSelectEnumSchema
    domain_of:
    - JsonSchema
    - UntitledMultiSelectEnumSchema
    - TitledMultiSelectEnumSchema
    range: SchemaItems
    inlined: true
    inlined_as_list: true
  blob:
    name: blob
    definition_uri: https://w3id.org/lmodel/mcp/blob
    description: A base64-encoded string representing binary data.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:blob
    owner: BlobResourceContents
    domain_of:
    - ResourceContents
    - BlobResourceContents
    range: string
  audience:
    name: audience
    definition_uri: https://w3id.org/lmodel/mcp/audience
    description: Describes who the intended audience of this object or data is.
    from_schema: https://w3id.org/lmodel/mcp
    slot_uri: mcp:audience
