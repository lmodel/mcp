    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - NumberSchema_type
    - NumberSchema_default
    - default_value
    - description
    - minimum
    - maximum
    - title
    slot_usage:
      default:
        name: default
        range: integer
      type:
        name: type
        required: true
