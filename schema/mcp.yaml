    slots:
    - listChanged
    class_uri: mcp:RootsCapability
  PromptsCapability:
    name: PromptsCapability
    definition_uri: https://w3id.org/lmodel/mcp/PromptsCapability
    description: Server prompts capability.
    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - listChanged
    class_uri: mcp:PromptsCapability
  ResourcesCapability:
    name: ResourcesCapability
    definition_uri: https://w3id.org/lmodel/mcp/ResourcesCapability
    description: Server resources capability.
    from_schema: https://w3id.org/lmodel/mcp
    slots:
    - listChanged
    - subscribe
    class_uri: mcp:ResourcesCapability
  ToolsCapability:
    name: ToolsCapability
    definition_uri: https://w3id.org/lmodel/mcp/ToolsCapability
