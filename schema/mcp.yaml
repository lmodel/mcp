        range: JsonSchema
        inlined: true
      email:
        name: email
        range: JsonSchema
        inlined: true
      age:
        name: age
        range: JsonSchema
        inlined: true
      city:
        name: city
        range: JsonSchema
        inlined: true
      location:
        name: location
        range: JsonSchema
        inlined: true
      a:
        name: a
        range: JsonSchema
        inlined: true
      b:
        name: b
        range: JsonSchema
        inlined: true
      temperature:
        name: temperature
        range: JsonSchema
        inlined: true
      conditions:
        name: conditions
        range: JsonSchema
        inlined: true
      humidity:
