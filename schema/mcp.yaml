      elicitation:
        name: elicitation
        range: ElicitationCapability
        inlined: true
      extensions:
        name: extensions
        range: ExtensionsCapability
        inlined: true
      sampling:
        name: sampling
        range: SamplingCapability
        inlined: true
      roots:
        name: roots
        range: RootsCapability
        multivalued: false
        inlined: true
      tasks:
        name: tasks
        range: TasksCapability
        multivalued: false
        inlined: true
    class_uri: mcp:ClientCapabilities
    extra_slots:
      allowed: true
