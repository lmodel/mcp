---
id: https://w3id.org/lmodel/mcp
name: mcp
title: mcp
description: |-
  Model Context Protocol LinkML Schema
license: Apache-2.0
source: https://github.com/modelcontextprotocol/modelcontextprotocol/tree/main/schema
version: draft  # 2026

annotations: {}   # vendor metadata

see_also:
  - https://lmodel.github.io/mcp
  - https://spec.modelcontextprotocol.io

prefixes:
  mcp: https://w3id.org/lmodel/mcp/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dct: http://purl.org/dc/terms/
  jsonrpc: https://www.jsonrpc.org/

default_prefix: mcp
default_range: string

imports:
  - linkml:types

# ────────────────────────────────────────────
# Types
# ────────────────────────────────────────────
types:
  Cursor:
    uri: xsd:string
    base: str
    description: An opaque token used to represent a cursor for pagination.

  ProgressToken:
    uri: xsd:string
    base: str
    description: >-
      A progress token, used to associate progress notifications with
      the original request.

  RequestId:
    uri: xsd:string
    base: str
    description: A uniquely identifying ID for a request in JSON-RPC.

  JsonValue:
    uri: xsd:string
    base: str
    description: Any JSON-serializable value represented as a string.

# ────────────────────────────────────────────
# Enums
# ────────────────────────────────────────────
enums:
  Role:
    description: The sender or recipient of messages and data in a conversation.
    permissible_values:
      assistant:
        description: The assistant role.
      user:
        description: The user role.

  LoggingLevel:
    description: >-
      The severity of a log message.
      Maps to syslog message severities (RFC-5424).
    see_also:
      - https://datatracker.ietf.org/doc/html/rfc5424#section-6.2.1
    permissible_values:
      alert:
        description: Alert severity.
      critical:
        description: Critical severity.
      debug:
        description: Debug severity.
      emergency:
        description: Emergency severity.
      error:
        description: Error severity.
      info:
        description: Informational severity.
      notice:
        description: Notice severity.
      warning:
        description: Warning severity.

  TaskStatusEnum:
    description: The status of a task.
    permissible_values:
      cancelled:
        description: Task was cancelled.
      completed:
        description: Task completed successfully.
      failed:
        description: Task failed.
      input_required:
        description: Task requires additional input.
      working:
        description: Task is currently in progress.

  IncludeContextEnum:
    description: Context inclusion mode for sampling requests.
    permissible_values:
      allServers:
        description: Include context from all servers.
      none:
        description: Include no context.
      thisServer:
        description: Include context from calling server only.

  ElicitActionEnum:
    description: User action in response to an elicitation.
    permissible_values:
      accept:
        description: User submitted the form/confirmed the action.
      cancel:
        description: User dismissed without making an explicit choice.
      decline:
        description: User explicitly declined the action.

  ToolChoiceModeEnum:
    description: Controls tool selection behavior for sampling requests.
    permissible_values:
      auto:
        description: Model decides whether to use tools (default).
      none:
        description: Model MUST NOT use any tools.
      required:
        description: Model MUST use at least one tool before completing.

  TaskSupportEnum:
    description: Indicates whether a tool supports task-augmented execution.
    permissible_values:
      forbidden:
        description: Tool does not support task-augmented execution (default).
      optional:
        description: Tool may support task-augmented execution.
      required:
        description: Tool requires task-augmented execution.

  IconThemeEnum:
    description: Theme specifier for an icon.
    permissible_values:
      dark:
        description: Icon designed for a dark background.
      light:
        description: Icon designed for a light background.

  NumberTypeEnum:
    description: Number type discriminator.
    permissible_values:
      integer:
        description: Integer type.
      number:
        description: Number type.

  StringFormatEnum:
    description: String format constraints.
    permissible_values:
      date:
        description: Date format.
      date-time:
        description: Date-time format.
      email:
        description: Email format.
      uri:
        description: URI format.

# ────────────────────────────────────────────
# Slots
# ────────────────────────────────────────────
slots:
  # ── JSON-RPC transport slots ──
  jsonrpc:
    range: string
    description: JSON-RPC version string.
    required: true

  id:
    range: RequestId
    description: Uniquely identifying ID for a JSON-RPC request.

  method:
    range: string
    description: The JSON-RPC method name.

  # ── Common metadata slots ──
  name:
    range: string
    description: >-
      Intended for programmatic or logical use, but used as a display name
      in past specs or fallback (if title is not present).
    slot_uri: schema:name

  title:
    range: string
    description: >-
      Intended for UI and end-user contexts — optimized to be human-readable
      and easily understood.
    slot_uri: dct:title

  description:
    range: string
    description: A human-readable description.
    slot_uri: dct:description

  uri:
    range: uri
    description: A resource URI.

  mimeType:
    range: string
    description: The MIME type of a resource, if known.

  type:
    range: string
    description: Type discriminator field.

  # ── Content slots ──
  text:
    range: string
    description: Text content.

  data:
    range: string
    description: Base64-encoded binary data.

  blob:
    range: string
    description: A base64-encoded string representing binary data.

  # ── Annotations slots ──
  audience:
    range: Role
    multivalued: true
    description: Describes who the intended audience of this object or data is.

  priority:
    range: float
    description: >-
      How important this data is for operating the server.
      1 means most important (required), 0 means least important (optional).

  lastModified:
    range: string
    description: The moment the resource was last modified, as an ISO 8601 formatted string.

  annotations:
    range: Annotations
    description: Optional annotations for the client.
    inlined: true

  # ── Result / Error slots ──
  content:
    range: string
    description: Content of a message or result.

  isError:
    range: boolean
    description: Whether the tool call ended in an error.

  model:
    range: string
    description: The name of the model that generated the message.

  role:
    range: Role
    description: The role of the sender or recipient.

  stopReason:
    range: string
    description: The reason why sampling stopped, if known.

  # ── Pagination slots ──
  cursor:
    range: Cursor
    description: >-
      An opaque token representing the current pagination position.
      If provided, the server should return results starting after this cursor.

  nextCursor:
    range: string
    description: >-
      An opaque token representing the pagination position after the last
      returned result. If present, there may be more results available.

  # ── Progress slots ──
  progress:
    range: float
    description: The progress thus far.

  progressToken:
    range: ProgressToken
    description: >-
      The progress token which was given in the initial request, used to
      associate this notification with the request that is proceeding.

  total:
    range: float
    description: Total number of items to process (or total progress required), if known.

  message:
    range: string
    description: A message string.

  # ── Error slots ──
  code:
    range: integer
    description: The error type that occurred.

  error:
    range: Error
    description: The error object.
    inlined: true

  # ── Task slots ──
  taskId:
    range: string
    description: The task identifier.

  status:
    range: TaskStatusEnum
    description: Current task state.

  createdAt:
    range: string
    description: ISO 8601 timestamp when the task was created.

  lastUpdatedAt:
    range: string
    description: ISO 8601 timestamp when the task was last updated.

  ttl:
    range: integer
    description: Actual retention duration from creation in milliseconds, null for unlimited.

  statusMessage:
    range: string
    description: Optional human-readable message describing the current task state.

  pollInterval:
    range: integer
    description: Suggested polling interval in milliseconds.

  # ── Capability slots ──
  protocolVersion:
    range: string
    description: The version of the Model Context Protocol.

  capabilities:
    range: string
    description: Capabilities object.

  instructions:
    range: string
    description: Instructions describing how to use the server and its features.

  # ── Tool slots ──
  inputSchema:
    range: string
    description: A JSON Schema object defining the expected parameters for the tool.

  outputSchema:
    range: string
    description: An optional JSON Schema object defining the structure of the tool's output.

  # ── Resource slots ──
  uriTemplate:
    range: string
    description: A URI template (RFC 6570) for constructing resource URIs.

  size:
    range: integer
    description: The size of the raw resource content, in bytes.

  # ── Logging slots ──
  level:
    range: LoggingLevel
    description: The severity of a log message.

  logger:
    range: string
    description: An optional name of the logger issuing this message.

  # ── Icon slots ──
  src:
    range: uri
    description: A standard URI pointing to an icon resource.

  sizes:
    range: string
    multivalued: true
    description: >-
      Optional array of strings specifying sizes (WxH format or "any").

  theme:
    range: IconThemeEnum
    description: Optional theme specifier for the icon.

  # ── Prompt slots ──
  arguments:
    range: string
    description: Arguments for templating.

  required_field:
    range: boolean
    description: Whether this argument must be provided.
    aliases:
      - required

  # ── Sampling slots ──
  maxTokens:
    range: integer
    description: The requested maximum number of tokens to sample.

  systemPrompt:
    range: string
    description: An optional system prompt the server wants to use for sampling.

  temperature:
    range: float
    description: Sampling temperature.

  includeContext:
    range: IncludeContextEnum
    description: A request to include context from one or more MCP servers.

  # ── Elicitation slots ──
  action:
    range: ElicitActionEnum
    description: The user action in response to the elicitation.

  requestedSchema:
    range: string
    description: A restricted subset of JSON Schema.

  elicitationId:
    range: string
    description: The ID of the elicitation.

  url:
    range: uri
    description: The URL that the user should navigate to.

  mode:
    range: string
    description: The elicitation mode.

  # ── Implementation slots ──
  version:
    range: string
    description: The version of this implementation.

  websiteUrl:
    range: uri
    description: An optional URL of the website for this implementation.

  # ── Schema definition slots ──
  default_value:
    range: string
    description: Default value for a schema field.
    aliases:
      - default

  format:
    range: StringFormatEnum
    description: String format constraint.

  minimum:
    range: integer
    description: Minimum value constraint.

  maximum:
    range: integer
    description: Maximum value constraint.

  minLength:
    range: integer
    description: Minimum length constraint.

  maxLength:
    range: integer
    description: Maximum length constraint.

  enum_values:
    range: string
    multivalued: true
    description: Array of enum values.
    aliases:
      - enum

  enumNames:
    range: string
    multivalued: true
    description: Display names for enum values (legacy).

  minItems:
    range: integer
    description: Minimum number of items.

  maxItems:
    range: integer
    description: Maximum number of items.

  # ── ToolAnnotations slots ──
  destructiveHint:
    range: boolean
    description: If true, the tool may perform destructive updates.

  idempotentHint:
    range: boolean
    description: If true, calling repeatedly with same arguments has no additional effect.

  openWorldHint:
    range: boolean
    description: If true, tool may interact with an open world of external entities.

  readOnlyHint:
    range: boolean
    description: If true, the tool does not modify its environment.

  # ── Tool use / result slots ──
  toolUseId:
    range: string
    description: The ID of the tool use this result corresponds to.

  input:
    range: string
    description: The arguments to pass to the tool.

  structuredContent:
    range: string
    description: An optional JSON object representing structured result of the tool call.

  # ── Misc slots ──
  reason:
    range: string
    description: An optional string describing the reason.

  requestId:
    range: RequestId
    description: The ID of a request.

  hasMore:
    range: boolean
    description: Indicates whether there are additional completion options.

  values:
    range: string
    multivalued: true
    description: An array of completion values.

  value:
    range: string
    description: A value string.

  listChanged:
    range: boolean
    description: Whether notifications for list changes are supported.

  subscribe:
    range: boolean
    description: Whether subscribing to resource updates is supported.

  icons:
    range: Icon
    multivalued: true
    inlined_as_list: true
    description: >-
      Optional set of sized icons that the client can display in a user interface.

  costPriority:
    range: float
    description: How much to prioritize cost when selecting a model (0-1).

  intelligencePriority:
    range: float
    description: How much to prioritize intelligence when selecting a model (0-1).

  speedPriority:
    range: float
    description: How much to prioritize sampling speed when selecting a model (0-1).

  stopSequences:
    range: string
    multivalued: true
    description: Stop sequences for sampling.

  task:
    range: Task
    description: Task data.
    inlined: true

  taskSupport:
    range: TaskSupportEnum
    description: Whether this tool supports task-augmented execution.

# ────────────────────────────────────────────
# Classes
# ────────────────────────────────────────────
classes:

  # ════════════════════════════════════════════
  # Mixins
  # ════════════════════════════════════════════

  HasMeta:
    mixin: true
    description: Mixin for types that carry a _meta field.
    attributes:
      _meta:
        range: string
        description: Optional metadata object.

  HasAnnotations:
    mixin: true
    description: Mixin for types that carry annotations.
    slots:
      - annotations

  HasIcons:
    mixin: true
    description: Mixin for types that carry icons.
    slots:
      - icons

  HasName:
    mixin: true
    description: Mixin for types that carry name and title.
    slots:
      - name
      - title

  # ════════════════════════════════════════════
  # Annotations
  # ════════════════════════════════════════════

  Annotations:
    description: >-
      Optional annotations for the client. The client can use annotations to
      inform how objects are used or displayed.
    slots:
      - audience
      - lastModified
      - priority

  # ════════════════════════════════════════════
  # Error types
  # ════════════════════════════════════════════

  Error:
    description: A JSON-RPC error object.
    slots:
      - code
      - message
    slot_usage:
      code:
        required: true
      message:
        required: true

  InternalError:
    is_a: Error
    description: >-
      A JSON-RPC error indicating that an internal error occurred on the
      receiver (-32603).

  InvalidParamsError:
    is_a: Error
    description: >-
      A JSON-RPC error indicating that the method parameters are invalid
      or malformed (-32602).

  InvalidRequestError:
    is_a: Error
    description: >-
      A JSON-RPC error indicating that the request is not a valid request
      object (-32600).

  MethodNotFoundError:
    is_a: Error
    description: >-
      A JSON-RPC error indicating that the requested method does not exist
      or is not available (-32601).

  ParseError:
    is_a: Error
    description: >-
      A JSON-RPC error indicating that invalid JSON was received
      by the server (-32700).

  # ════════════════════════════════════════════
  # Icon
  # ════════════════════════════════════════════

  Icon:
    description: An optionally-sized icon that can be displayed in a user interface.
    slots:
      - src
      - mimeType
      - sizes
      - theme
    slot_usage:
      src:
        required: true

  # ════════════════════════════════════════════
  # Implementation
  # ════════════════════════════════════════════

  Implementation:
    description: Describes the MCP implementation.
    mixins:
      - HasName
      - HasIcons
    slots:
      - version
      - description
      - websiteUrl
    slot_usage:
      name:
        required: true
      version:
        required: true

  # ════════════════════════════════════════════
  # Content types
  # ════════════════════════════════════════════

  TextContent:
    description: Text provided to or from an LLM.
    mixins:
      - HasMeta
      - HasAnnotations
    slots:
      - text
      - type
    slot_usage:
      text:
        required: true
      type:
        required: true
        equals_string: "text"

  ImageContent:
    description: An image provided to or from an LLM.
    mixins:
      - HasMeta
      - HasAnnotations
    slots:
      - data
      - mimeType
      - type
    slot_usage:
      data:
        required: true
      mimeType:
        required: true
      type:
        required: true
        equals_string: "image"

  AudioContent:
    description: Audio provided to or from an LLM.
    mixins:
      - HasMeta
      - HasAnnotations
    slots:
      - data
      - mimeType
      - type
    slot_usage:
      data:
        required: true
      mimeType:
        required: true
      type:
        required: true
        equals_string: "audio"

  EmbeddedResource:
    description: >-
      The contents of a resource, embedded into a prompt or tool call result.
    mixins:
      - HasMeta
      - HasAnnotations
    slots:
      - type
    attributes:
      resource:
        range: string
        required: true
        description: The embedded resource contents (text or blob).
    slot_usage:
      type:
        required: true
        equals_string: "resource"

  ResourceLink:
    description: >-
      A resource that the server is capable of reading, included in a prompt
      or tool call result.
    mixins:
      - HasMeta
      - HasAnnotations
      - HasName
      - HasIcons
    slots:
      - uri
      - mimeType
      - description
      - size
      - type
    slot_usage:
      name:
        required: true
      uri:
        required: true
      type:
        required: true
        equals_string: "resource_link"

  ToolUseContent:
    description: A request from the assistant to call a tool.
    mixins:
      - HasMeta
    slots:
      - type
      - name
      - input
    attributes:
      id:
        range: string
        required: true
        description: A unique identifier for this tool use.
    slot_usage:
      type:
        required: true
        equals_string: "tool_use"
      name:
        required: true
      input:
        required: true

  ToolResultContent:
    description: The result of a tool use, provided by the user back to the assistant.
    mixins:
      - HasMeta
    slots:
      - type
      - toolUseId
      - isError
      - structuredContent
    attributes:
      content:
        range: string
        multivalued: true
        required: true
        description: The unstructured result content of the tool use.
    slot_usage:
      type:
        required: true
        equals_string: "tool_result"
      toolUseId:
        required: true

  # ════════════════════════════════════════════
  # Resource contents
  # ════════════════════════════════════════════

  TextResourceContents:
    description: Text resource contents.
    mixins:
      - HasMeta
    slots:
      - uri
      - mimeType
      - text
    slot_usage:
      uri:
        required: true
      text:
        required: true

  BlobResourceContents:
    description: Blob resource contents.
    mixins:
      - HasMeta
    slots:
      - uri
      - mimeType
      - blob
    slot_usage:
      uri:
        required: true
      blob:
        required: true

  # ════════════════════════════════════════════
  # Resource / Prompt / Tool definitions
  # ════════════════════════════════════════════

  Resource:
    description: A known resource that the server is capable of reading.
    mixins:
      - HasMeta
      - HasAnnotations
      - HasName
      - HasIcons
    slots:
      - uri
      - mimeType
      - description
      - size
    slot_usage:
      name:
        required: true
      uri:
        required: true

  ResourceTemplate:
    description: A template description for resources available on the server.
    mixins:
      - HasMeta
      - HasAnnotations
      - HasName
      - HasIcons
    slots:
      - uriTemplate
      - mimeType
      - description
    slot_usage:
      name:
        required: true
      uriTemplate:
        required: true

  Root:
    description: Represents a root directory or file that the server can operate on.
    mixins:
      - HasMeta
    slots:
      - uri
      - name
    slot_usage:
      uri:
        required: true

  PromptArgument:
    description: Describes an argument that a prompt can accept.
    mixins:
      - HasName
    slots:
      - description
      - required_field
    slot_usage:
      name:
        required: true

  Prompt:
    description: A prompt or prompt template that the server offers.
    mixins:
      - HasMeta
      - HasName
      - HasIcons
    slots:
      - description
    attributes:
      arguments:
        range: PromptArgument
        multivalued: true
        inlined_as_list: true
        description: A list of arguments to use for templating the prompt.
    slot_usage:
      name:
        required: true

  PromptMessage:
    description: Describes a message returned as part of a prompt.
    slots:
      - role
    attributes:
      content:
        range: string
        required: true
        description: The content of the prompt message.
    slot_usage:
      role:
        required: true

  PromptReference:
    description: Identifies a prompt.
    mixins:
      - HasName
    slots:
      - type
    slot_usage:
      name:
        required: true
      type:
        required: true
        equals_string: "ref/prompt"

  ResourceTemplateReference:
    description: A reference to a resource or resource template definition.
    slots:
      - type
      - uri
    slot_usage:
      type:
        required: true
        equals_string: "ref/resource"
      uri:
        required: true

  ToolAnnotations:
    description: >-
      Additional properties describing a Tool to clients.
      All properties are hints, not guarantees.
    slots:
      - title
      - destructiveHint
      - idempotentHint
      - openWorldHint
      - readOnlyHint

  ToolChoice:
    description: Controls tool selection behavior for sampling requests.
    attributes:
      mode:
        range: ToolChoiceModeEnum
        description: Controls the tool use ability of the model.

  ToolExecution:
    description: Execution-related properties for a tool.
    slots:
      - taskSupport

  Tool:
    description: Definition for a tool the client can call.
    mixins:
      - HasMeta
      - HasName
      - HasIcons
    slots:
      - description
      - inputSchema
      - outputSchema
    attributes:
      annotations:
        range: ToolAnnotations
        inlined: true
        description: Optional additional tool information.
      execution:
        range: ToolExecution
        inlined: true
        description: Execution-related properties for this tool.
    slot_usage:
      name:
        required: true
      inputSchema:
        required: true

  # ════════════════════════════════════════════
  # Model preferences
  # ════════════════════════════════════════════

  ModelHint:
    description: Hints to use for model selection.
    slots:
      - name

  ModelPreferences:
    description: >-
      The server's preferences for model selection, requested of the client
      during sampling.
    slots:
      - costPriority
      - intelligencePriority
      - speedPriority
    attributes:
      hints:
        range: ModelHint
        multivalued: true
        inlined_as_list: true
        description: Optional hints to use for model selection.

  # ════════════════════════════════════════════
  # Sampling message
  # ════════════════════════════════════════════

  SamplingMessage:
    description: Describes a message issued to or received from an LLM API.
    mixins:
      - HasMeta
    slots:
      - role
    attributes:
      content:
        range: string
        required: true
        description: The message content.
    slot_usage:
      role:
        required: true

  # ════════════════════════════════════════════
  # Task
  # ════════════════════════════════════════════

  Task:
    description: Data associated with a task.
    slots:
      - taskId
      - status
      - createdAt
      - lastUpdatedAt
      - ttl
      - statusMessage
      - pollInterval
    slot_usage:
      taskId:
        required: true
      status:
        required: true
      createdAt:
        required: true
      lastUpdatedAt:
        required: true
      ttl:
        required: true

  TaskMetadata:
    description: >-
      Metadata for augmenting a request with task execution.
    slots:
      - ttl

  RelatedTaskMetadata:
    description: >-
      Metadata for associating messages with a task.
    slots:
      - taskId
    slot_usage:
      taskId:
        required: true

  # ════════════════════════════════════════════
  # Capabilities
  # ════════════════════════════════════════════

  ClientCapabilities:
    description: >-
      Capabilities a client may support. Known capabilities are defined here,
      but this is not a closed set.

  ServerCapabilities:
    description: >-
      Capabilities that a server may support. Known capabilities are defined
      here, but this is not a closed set.

  # ════════════════════════════════════════════
  # Schema definition types (elicitation)
  # ════════════════════════════════════════════

  StringSchema:
    description: String schema definition.
    slots:
      - type
      - default_value
      - description
      - format
      - minLength
      - maxLength
      - title
    slot_usage:
      type:
        required: true
        equals_string: "string"

  NumberSchema:
    description: Number schema definition.
    slots:
      - type
      - default_value
      - description
      - minimum
      - maximum
      - title
    slot_usage:
      type:
        required: true

  BooleanSchema:
    description: Boolean schema definition.
    slots:
      - type
      - title
      - description
    attributes:
      default:
        range: boolean
        description: Default boolean value.
    slot_usage:
      type:
        required: true
        equals_string: "boolean"

  UntitledSingleSelectEnumSchema:
    description: Single-selection enum without display titles.
    slots:
      - type
      - enum_values
      - default_value
      - description
      - title
    slot_usage:
      type:
        required: true
        equals_string: "string"
      enum_values:
        required: true

  TitledSingleSelectEnumSchema:
    description: Single-selection enum with display titles for each option.
    slots:
      - type
      - default_value
      - description
      - title
    slot_usage:
      type:
        required: true
        equals_string: "string"

  UntitledMultiSelectEnumSchema:
    description: Multi-selection enum without display titles.
    slots:
      - type
      - default_value
      - description
      - title
      - minItems
      - maxItems
    slot_usage:
      type:
        required: true
        equals_string: "array"

  TitledMultiSelectEnumSchema:
    description: Multi-selection enum with display titles for each option.
    slots:
      - type
      - default_value
      - description
      - title
      - minItems
      - maxItems
    slot_usage:
      type:
        required: true
        equals_string: "array"

  LegacyTitledEnumSchema:
    description: >-
      Legacy titled enum schema. Use TitledSingleSelectEnumSchema instead.
    deprecated: >-
      Use TitledSingleSelectEnumSchema instead. Will be removed in a future version.
    slots:
      - type
      - enum_values
      - enumNames
      - default_value
      - description
      - title
    slot_usage:
      type:
        required: true
        equals_string: "string"
      enum_values:
        required: true

  # ════════════════════════════════════════════
  # Abstract bases: JSON-RPC message types
  # ════════════════════════════════════════════

  JSONRPCRequest:
    abstract: true
    description: A request that expects a response.
    slots:
      - id
      - jsonrpc
      - method
    slot_usage:
      id:
        required: true
      jsonrpc:
        required: true
      method:
        required: true

  JSONRPCNotification:
    abstract: true
    description: A notification which does not expect a response.
    slots:
      - jsonrpc
      - method
    slot_usage:
      jsonrpc:
        required: true
      method:
        required: true

  JSONRPCResultResponse:
    abstract: true
    description: A successful (non-error) response to a request.
    slots:
      - id
      - jsonrpc
    slot_usage:
      id:
        required: true
      jsonrpc:
        required: true

  JSONRPCErrorResponse:
    description: A response to a request that indicates an error occurred.
    slots:
      - id
      - jsonrpc
      - error
    slot_usage:
      jsonrpc:
        required: true
      error:
        required: true

  Result:
    description: Common result fields.
    mixins:
      - HasMeta

  # ════════════════════════════════════════════
  # Notification params
  # ════════════════════════════════════════════

  CancelledNotificationParams:
    description: Parameters for a notifications/cancelled notification.
    mixins:
      - HasMeta
    slots:
      - requestId
      - reason

  ProgressNotificationParams:
    description: Parameters for a notifications/progress notification.
    mixins:
      - HasMeta
    slots:
      - progress
      - progressToken
      - total
      - message
    slot_usage:
      progress:
        required: true
      progressToken:
        required: true

  LoggingMessageNotificationParams:
    description: Parameters for a notifications/message notification.
    mixins:
      - HasMeta
    slots:
      - level
      - logger
    attributes:
      data:
        range: string
        required: true
        description: The data to be logged.
    slot_usage:
      level:
        required: true

  ResourceUpdatedNotificationParams:
    description: Parameters for a notifications/resources/updated notification.
    mixins:
      - HasMeta
    slots:
      - uri
    slot_usage:
      uri:
        required: true

  # ════════════════════════════════════════════
  # Notifications
  # ════════════════════════════════════════════

  CancelledNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification to indicate that a previously-issued request is being cancelled.
    attributes:
      params:
        range: CancelledNotificationParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "notifications/cancelled"

  InitializedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification sent from the client to the server after initialization
      has finished.
    slot_usage:
      method:
        equals_string: "notifications/initialized"

  ProgressNotification:
    is_a: JSONRPCNotification
    description: >-
      Out-of-band notification to inform the receiver of a progress update.
    attributes:
      params:
        range: ProgressNotificationParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "notifications/progress"

  ResourceListChangedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification that the list of resources the server can read from has changed.
    slot_usage:
      method:
        equals_string: "notifications/resources/list_changed"

  ResourceUpdatedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification that a resource has changed and may need to be read again.
    attributes:
      params:
        range: ResourceUpdatedNotificationParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "notifications/resources/updated"

  PromptListChangedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification that the list of prompts the server offers has changed.
    slot_usage:
      method:
        equals_string: "notifications/prompts/list_changed"

  ToolListChangedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification that the list of tools the server offers has changed.
    slot_usage:
      method:
        equals_string: "notifications/tools/list_changed"

  RootsListChangedNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification from the client that the list of roots has changed.
    slot_usage:
      method:
        equals_string: "notifications/roots/list_changed"

  LoggingMessageNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification of a log message passed from server to client.
    attributes:
      params:
        range: LoggingMessageNotificationParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "notifications/message"

  ElicitationCompleteNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification from the server that an out-of-band elicitation request
      completed.
    slot_usage:
      method:
        equals_string: "notifications/elicitation/complete"

  TaskStatusNotification:
    is_a: JSONRPCNotification
    description: >-
      Notification that a task's status has changed.
    slot_usage:
      method:
        equals_string: "notifications/tasks/status"

  # ════════════════════════════════════════════
  # Request param types
  # ════════════════════════════════════════════

  CallToolRequestParams:
    description: Parameters for a tools/call request.
    slots:
      - name
    attributes:
      arguments:
        range: string
        description: Arguments to use for the tool call.
      task:
        range: TaskMetadata
        inlined: true
        description: If specified, the caller is requesting task-augmented execution.
    slot_usage:
      name:
        required: true

  GetPromptRequestParams:
    description: Parameters for a prompts/get request.
    slots:
      - name
    attributes:
      arguments:
        range: string
        description: Arguments to use for templating the prompt.
    slot_usage:
      name:
        required: true

  CompleteRequestParams:
    description: Parameters for a completion/complete request.
    attributes:
      argument:
        range: string
        required: true
        description: The argument's information.
      ref:
        range: string
        required: true
        description: A prompt or resource template reference.

  ReadResourceRequestParams:
    description: Parameters for a resources/read request.
    slots:
      - uri
    slot_usage:
      uri:
        required: true

  SubscribeRequestParams:
    description: Parameters for a resources/subscribe request.
    slots:
      - uri
    slot_usage:
      uri:
        required: true

  UnsubscribeRequestParams:
    description: Parameters for a resources/unsubscribe request.
    slots:
      - uri
    slot_usage:
      uri:
        required: true

  SetLevelRequestParams:
    description: Parameters for a logging/setLevel request.
    slots:
      - level
    slot_usage:
      level:
        required: true

  InitializeRequestParams:
    description: Parameters for an initialize request.
    slots:
      - protocolVersion
    attributes:
      capabilities:
        range: ClientCapabilities
        required: true
        inlined: true
        description: Client capabilities.
      clientInfo:
        range: Implementation
        required: true
        inlined: true
        description: Information about the client implementation.
    slot_usage:
      protocolVersion:
        required: true

  CreateMessageRequestParams:
    description: Parameters for a sampling/createMessage request.
    slots:
      - maxTokens
      - systemPrompt
      - temperature
      - includeContext
      - stopSequences
    attributes:
      messages:
        range: SamplingMessage
        multivalued: true
        inlined_as_list: true
        required: true
        description: Messages for sampling.
      modelPreferences:
        range: ModelPreferences
        inlined: true
        description: Model preferences for sampling.
      tools:
        range: Tool
        multivalued: true
        inlined_as_list: true
        description: Tools that the model may use during generation.
      toolChoice:
        range: ToolChoice
        inlined: true
        description: Controls how the model uses tools.
      task:
        range: TaskMetadata
        inlined: true
        description: If specified, task-augmented execution.
    slot_usage:
      maxTokens:
        required: true

  ElicitRequestFormParams:
    description: >-
      Parameters for a form-mode elicitation request.
    slots:
      - message
      - requestedSchema
      - mode
    attributes:
      task:
        range: TaskMetadata
        inlined: true
        description: If specified, task-augmented execution.
    slot_usage:
      message:
        required: true
      requestedSchema:
        required: true

  ElicitRequestURLParams:
    description: >-
      Parameters for a URL-mode elicitation request.
    slots:
      - elicitationId
      - message
      - mode
      - url
    attributes:
      task:
        range: TaskMetadata
        inlined: true
        description: If specified, task-augmented execution.
    slot_usage:
      elicitationId:
        required: true
      message:
        required: true
      mode:
        required: true
        equals_string: "url"
      url:
        required: true

  PaginatedRequestParams:
    description: Common params for paginated requests.
    slots:
      - cursor

  # ════════════════════════════════════════════
  # Requests
  # ════════════════════════════════════════════

  InitializeRequest:
    is_a: JSONRPCRequest
    description: >-
      Request sent from the client to the server when it first connects,
      asking it to begin initialization.
    attributes:
      params:
        range: InitializeRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "initialize"

  PingRequest:
    is_a: JSONRPCRequest
    description: >-
      A ping, issued by either the server or the client, to check that
      the other party is still alive.
    slot_usage:
      method:
        equals_string: "ping"

  ListResourcesRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to request a list of resources the server has.
    slot_usage:
      method:
        equals_string: "resources/list"

  ListResourceTemplatesRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to request a list of resource templates the server has.
    slot_usage:
      method:
        equals_string: "resources/templates/list"

  ReadResourceRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to the server, to read a specific resource URI.
    attributes:
      params:
        range: ReadResourceRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "resources/read"

  SubscribeRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to request resource update notifications.
    attributes:
      params:
        range: SubscribeRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "resources/subscribe"

  UnsubscribeRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to cancel resource update notifications.
    attributes:
      params:
        range: UnsubscribeRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "resources/unsubscribe"

  ListPromptsRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to request a list of prompts and prompt templates.
    slot_usage:
      method:
        equals_string: "prompts/list"

  GetPromptRequest:
    is_a: JSONRPCRequest
    description: >-
      Used by the client to get a prompt provided by the server.
    attributes:
      params:
        range: GetPromptRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "prompts/get"

  ListToolsRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the client to request a list of tools the server has.
    slot_usage:
      method:
        equals_string: "tools/list"

  CallToolRequest:
    is_a: JSONRPCRequest
    description: >-
      Used by the client to invoke a tool provided by the server.
    attributes:
      params:
        range: CallToolRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "tools/call"

  CompleteRequest:
    is_a: JSONRPCRequest
    description: >-
      A request from the client to the server, to ask for completion options.
    attributes:
      params:
        range: CompleteRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "completion/complete"

  SetLevelRequest:
    is_a: JSONRPCRequest
    description: >-
      A request from the client to the server, to enable or adjust logging.
    attributes:
      params:
        range: SetLevelRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "logging/setLevel"

  CreateMessageRequest:
    is_a: JSONRPCRequest
    description: >-
      A request from the server to sample an LLM via the client.
    attributes:
      params:
        range: CreateMessageRequestParams
        required: true
        inlined: true
    slot_usage:
      method:
        equals_string: "sampling/createMessage"

  ListRootsRequest:
    is_a: JSONRPCRequest
    description: >-
      Sent from the server to request a list of root URIs from the client.
    slot_usage:
      method:
        equals_string: "roots/list"

  ElicitRequest:
    is_a: JSONRPCRequest
    description: >-
      A request from the server to elicit additional information from the
      user via the client.
    slot_usage:
      method:
        equals_string: "elicitation/create"

  ListTasksRequest:
    is_a: JSONRPCRequest
    description: >-
      A request to retrieve a list of tasks.
    slot_usage:
      method:
        equals_string: "tasks/list"

  GetTaskRequest:
    is_a: JSONRPCRequest
    description: >-
      A request to retrieve the state of a task.
    slot_usage:
      method:
        equals_string: "tasks/get"

  GetTaskPayloadRequest:
    is_a: JSONRPCRequest
    description: >-
      A request to retrieve the result of a completed task.
    slot_usage:
      method:
        equals_string: "tasks/result"

  CancelTaskRequest:
    is_a: JSONRPCRequest
    description: >-
      A request to cancel a task.
    slot_usage:
      method:
        equals_string: "tasks/cancel"

  # ════════════════════════════════════════════
  # Results
  # ════════════════════════════════════════════

  InitializeResult:
    is_a: Result
    description: >-
      The result returned by the server for an initialize request.
    slots:
      - protocolVersion
      - instructions
    attributes:
      capabilities:
        range: ServerCapabilities
        required: true
        inlined: true
        description: Server capabilities.
      serverInfo:
        range: Implementation
        required: true
        inlined: true
        description: Information about the server implementation.
    slot_usage:
      protocolVersion:
        required: true

  CallToolResult:
    is_a: Result
    description: >-
      The result returned by the server for a tools/call request.
    slots:
      - isError
      - structuredContent
    attributes:
      content:
        range: string
        multivalued: true
        required: true
        description: A list of content objects that represent the result.

  CompleteResult:
    is_a: Result
    description: >-
      The result returned by the server for a completion/complete request.
    attributes:
      completion:
        range: string
        required: true
        description: The completion result object.

  GetPromptResult:
    is_a: Result
    description: >-
      The result returned by the server for a prompts/get request.
    slots:
      - description
    attributes:
      messages:
        range: PromptMessage
        multivalued: true
        inlined_as_list: true
        required: true
        description: The prompt messages.

  ListPromptsResult:
    is_a: Result
    description: >-
      The result returned by the server for a prompts/list request.
    slots:
      - nextCursor
    attributes:
      prompts:
        range: Prompt
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of prompts.

  ListResourcesResult:
    is_a: Result
    description: >-
      The result returned by the server for a resources/list request.
    slots:
      - nextCursor
    attributes:
      resources:
        range: Resource
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of resources.

  ListResourceTemplatesResult:
    is_a: Result
    description: >-
      The result returned by the server for a resources/templates/list request.
    slots:
      - nextCursor
    attributes:
      resourceTemplates:
        range: ResourceTemplate
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of resource templates.

  ReadResourceResult:
    is_a: Result
    description: >-
      The result returned by the server for a resources/read request.
    attributes:
      contents:
        range: string
        multivalued: true
        required: true
        description: The resource contents.

  ListToolsResult:
    is_a: Result
    description: >-
      The result returned by the server for a tools/list request.
    slots:
      - nextCursor
    attributes:
      tools:
        range: Tool
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of tools.

  ListRootsResult:
    is_a: Result
    description: >-
      The result returned by the client for a roots/list request.
    attributes:
      roots:
        range: Root
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of roots.

  CreateMessageResult:
    is_a: Result
    description: >-
      The result returned by the client for a sampling/createMessage request.
    slots:
      - model
      - role
      - stopReason
    attributes:
      content:
        range: string
        required: true
        description: The message content.
    slot_usage:
      model:
        required: true
      role:
        required: true

  ElicitResult:
    is_a: Result
    description: >-
      The result returned by the client for an elicitation/create request.
    slots:
      - action
    slot_usage:
      action:
        required: true

  CreateTaskResult:
    is_a: Result
    description: >-
      The result returned for a task-augmented request.
    slots:
      - task
    slot_usage:
      task:
        required: true

  GetTaskPayloadResult:
    is_a: Result
    description: >-
      The result returned for a tasks/result request.

  ListTasksResult:
    is_a: Result
    description: >-
      The result returned for a tasks/list request.
    slots:
      - nextCursor
    attributes:
      tasks:
        range: Task
        multivalued: true
        inlined_as_list: true
        required: true
        description: The list of tasks.

  # ════════════════════════════════════════════
  # Responses
  # ════════════════════════════════════════════

  InitializeResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for an initialize request.
    attributes:
      result:
        range: InitializeResult
        required: true
        inlined: true

  CallToolResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a tools/call request.
    attributes:
      result:
        range: CallToolResult
        required: true
        inlined: true

  CompleteResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a completion/complete request.
    attributes:
      result:
        range: CompleteResult
        required: true
        inlined: true

  GetPromptResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a prompts/get request.
    attributes:
      result:
        range: GetPromptResult
        required: true
        inlined: true

  ListPromptsResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a prompts/list request.
    attributes:
      result:
        range: ListPromptsResult
        required: true
        inlined: true

  ListResourcesResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a resources/list request.
    attributes:
      result:
        range: ListResourcesResult
        required: true
        inlined: true

  ListResourceTemplatesResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a resources/templates/list request.
    attributes:
      result:
        range: ListResourceTemplatesResult
        required: true
        inlined: true

  ReadResourceResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a resources/read request.
    attributes:
      result:
        range: ReadResourceResult
        required: true
        inlined: true

  ListToolsResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a tools/list request.
    attributes:
      result:
        range: ListToolsResult
        required: true
        inlined: true

  ListRootsResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the client for a roots/list request.
    attributes:
      result:
        range: ListRootsResult
        required: true
        inlined: true

  CreateMessageResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the client for a sampling/createMessage request.
    attributes:
      result:
        range: CreateMessageResult
        required: true
        inlined: true

  ElicitResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the client for an elicitation/create request.
    attributes:
      result:
        range: ElicitResult
        required: true
        inlined: true

  SetLevelResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response from the server for a logging/setLevel request.
    attributes:
      result:
        range: Result
        required: true
        inlined: true

  PingResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response for a ping request.
    attributes:
      result:
        range: Result
        required: true
        inlined: true

  SubscribeResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response for a resources/subscribe request.
    attributes:
      result:
        range: Result
        required: true
        inlined: true

  UnsubscribeResultResponse:
    is_a: JSONRPCResultResponse
    description: >-
      A successful response for a resources/unsubscribe request.
    attributes:
      result:
        range: Result
        required: true
        inlined: true

  CreateTaskResultResponse:
